<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ronin Kicks — Anime Merch</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg-base:#12111a;
    --bg-surface:#1c1a28;
    --bg-raised:#242233;
    --accent:#ff5d73;
    --accent-soft:#ff5d7322;
    --cyan:#6be0d6;
    --text:#f2f0f7;
    --text-muted:#8b869e;
    --border:#322f45;
    --radius:14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-base);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  ::selection{background:var(--accent-soft);}

  .app{max-width:520px;margin:0 auto;padding-bottom:90px;}

  /* Header / hero */
  .hero{
    position:relative;
    padding:28px 20px 24px;
    background:linear-gradient(160deg,var(--bg-surface) 0%,var(--bg-base) 70%);
    overflow:hidden;
    border-bottom:1px solid var(--border);
  }
  .hero::before{
    content:"";
    position:absolute; top:-40%; right:-20%;
    width:220px; height:220px;
    background:radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--cyan); margin:0 0 6px;
  }
  .hero h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:42px; letter-spacing:1px; line-height:0.95;
    margin:0; color:var(--text);
    position:relative;
  }
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--text-muted); font-size:14px; margin:8px 0 0; max-width:320px;}

  /* Tabs */
  .tabs{
    display:flex; gap:6px; padding:14px 20px 0;
    position:sticky; top:0; z-index:5;
    background:var(--bg-base);
  }
  .tab{
    flex:1; text-align:center; padding:10px 8px;
    border-radius:10px; font-size:13px; font-weight:600;
    color:var(--text-muted); cursor:pointer; user-select:none;
    border:1px solid transparent;
    transition:background .15s, color .15s;
  }
  .tab.active{background:var(--bg-raised); color:var(--text); border-color:var(--border);}
  .tab:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  .view{padding:18px 20px 0; display:none;}
  .view.active{display:block;}

  /* Product grid */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .card{
    background:var(--bg-surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .15s ease;
  }
  .card img{width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--bg-raised);}
  .card-body{padding:10px 12px 12px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .card-name{font-size:14px; font-weight:600; line-height:1.25;}
  .card-desc{font-size:12px; color:var(--text-muted); line-height:1.3; flex:1;}
  .card-price{font-family:'JetBrains Mono',monospace; color:var(--cyan); font-size:14px; font-weight:600;}
  .buy-btn{
    margin-top:4px; border:none; border-radius:8px;
    background:var(--accent); color:#1a0f12; font-weight:700; font-size:13px;
    padding:9px 0; cursor:pointer;
  }
  .buy-btn:active{transform:scale(0.97);}

  .empty{
    text-align:center; color:var(--text-muted); font-size:13px;
    padding:40px 10px; border:1px dashed var(--border); border-radius:var(--radius);
  }

  /* Order ticket (signature element) */
  .ticket{
    display:flex; background:var(--bg-surface); border:1px solid var(--border);
    border-radius:var(--radius); margin-bottom:14px; overflow:hidden;
  }
  .ticket-main{flex:1; padding:14px;}
  .ticket-stub{
    width:92px; flex-shrink:0; background:var(--bg-raised);
    border-left:2px dashed var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; padding:8px;
  }
  .ticket-code{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted);}
  .ticket-status{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    padding:3px 8px; border-radius:20px; text-align:center;
  }
  .status-pending{background:#4a3a1a; color:#ffcc66;}
  .status-confirmed{background:#1a4a35; color:#6be0d6;}
  .ticket h3{margin:0 0 6px; font-size:15px;}
  .ticket-row{display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-muted); margin-top:3px;}
  .ticket-row b{color:var(--text); font-weight:600; font-family:'JetBrains Mono',monospace;}

  /* Payment box */
  .pay-box{
    background:var(--bg-raised); border:1px solid var(--accent); border-radius:10px;
    padding:14px; margin-top:12px; font-size:13px; line-height:1.6;
  }
  .pay-box .label{color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:1px;}
  .pay-box .value{font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:14px; word-break:break-all;}

  /* Admin */
  .admin-locked{
    text-align:center; padding:60px 20px; color:var(--text-muted);
  }
  .section-title{
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.5px;
    margin:18px 0 10px; color:var(--text);
  }
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px;}
  .field input, .field textarea{
    width:100%; background:var(--bg-raised); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:9px 11px; font-size:13.5px;
    font-family:inherit;
  }
  .field input:focus, .field textarea:focus{outline:2px solid var(--cyan); outline-offset:1px;}
  .primary-btn{
    width:100%; border:none; border-radius:9px; background:var(--accent);
    color:#1a0f12; font-weight:700; font-size:14px; padding:11px 0; cursor:pointer; margin-top:4px;
  }
  .ghost-btn{
    width:100%; border:1px solid var(--border); border-radius:9px; background:transparent;
    color:var(--text-muted); font-weight:600; font-size:12.5px; padding:8px 0; cursor:pointer; margin-top:8px;
  }
  .admin-order-form{
    display:flex; gap:8px; margin-top:10px;
  }
  .admin-order-form input{flex:1;}
  .del-btn{
    background:transparent; border:1px solid #6b2a35; color:#ff8a97;
    border-radius:7px; font-size:11px; padding:6px 10px; cursor:pointer; margin-top:8px;
  }
  .product-admin-row{
    display:flex; gap:10px; align-items:center; background:var(--bg-surface);
    border:1px solid var(--border); border-radius:10px; padding:8px; margin-bottom:8px;
  }
  .product-admin-row img{width:44px; height:44px; border-radius:6px; object-fit:cover; background:var(--bg-raised);}
  .product-admin-row .pinfo{flex:1; font-size:12.5px;}
  .product-admin-row .pinfo b{display:block; font-size:13px;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--bg-raised); border:1px solid var(--cyan); color:var(--text);
    padding:10px 18px; border-radius:30px; font-size:13px; z-index:50;
    opacity:0; pointer-events:none; transition:opacity .2s, bottom .2s;
  }
  .toast.show{opacity:1; bottom:32px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="hero">
    <p class="eyebrow">Ronin Kicks Store</p>
    <h1>ANIME <span>DROPS</span></h1>
    <p>Hoodies, figures &amp; accessories — hand-picked, shipped by hand.</p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="catalog" tabindex="0" role="button">Catalog</div>
    <div class="tab" data-tab="orders" tabindex="0" role="button">My Orders</div>
    <div class="tab" id="adminTab" data-tab="admin" tabindex="0" role="button" style="display:none;">Admin</div>
  </div>

  <!-- CATALOG -->
  <div class="view active" id="view-catalog">
    <div class="grid" id="productGrid"></div>
  </div>

  <!-- MY ORDERS -->
  <div class="view" id="view-orders">
    <div id="ordersList"></div>
  </div>

  <!-- ADMIN -->
  <div class="view" id="view-admin">
    <div id="adminContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA LAYER
   ------------------------------------------------------------
   This demo keeps everything in memory (resets on page reload),
   so you can see the whole app working end-to-end right away.

   For a real store you MUST replace this with a backend:
   - Store products/orders in a real database.
   - Verify Telegram identity server-side using `Telegram.WebApp.initData`
     (the raw signed string) + your bot token — never trust
     `initDataUnsafe` alone for admin access, since it can be
     edited in the browser. Your server should recompute the
     HMAC signature and only then treat the user as verified.
   - Every "admin" action below (add/delete product, set price,
     set delivery days) should become a fetch() call to your
     server, which re-checks the admin's Telegram ID itself.
   The functions are named clearly so it's a straight swap later.
============================================================ */

const ADMIN_TELEGRAM_ID = 2002780745;
const PAYMENT_CARD = "5614 6818 5558 3120";
const PAYMENT_NAME = "Davron Mirzuparov";

let products = [
  { id: "p1", name: "Ronin Hoodie — Ink Wave", price: 39.99,
    image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400&q=80",
    description: "Heavyweight fleece, oversized fit, embroidered crest." },
  { id: "p2", name: "Kitsune Figure — Nine Tails", price: 54.00,
    image: "https://images.unsplash.com/photo-1608889175638-9e3ce1476161?w=400&q=80",
    description: "PVC collector figure, 18cm, numbered base." },
  { id: "p3", name: "Katana Keychain Set", price: 12.50,
    image: "https://images.unsplash.com/photo-1618172193622-ae2d025f4032?w=400&q=80",
    description: "Set of 3 metal charms, matte black finish." },
  { id: "p4", name: "Sakura Storm Tee", price: 24.00,
    image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80",
    description: "Soft cotton tee, front + back print." }
];

let orders = [];
let orderCounter = 1000;

/* ============================================================
   TELEGRAM IDENTITY
============================================================ */
let tgUser = null;
try{
  if (window.Telegram && window.Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user
      ? Telegram.WebApp.initDataUnsafe.user
      : null;
  }
}catch(e){ /* not running inside Telegram — fine for browser preview */ }

// Fallback so the page still works when opened outside Telegram (for testing)
if (!tgUser){
  tgUser = { id: 999999, first_name: "Test", username: "test_user" };
}

const isAdmin = tgUser.id === ADMIN_TELEGRAM_ID;

/* ============================================================
   HELPERS
============================================================ */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function genCode(){
  orderCounter += 1;
  return "RK-" + orderCounter;
}
function fmt(n){
  return "$" + Number(n).toFixed(2);
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ============================================================
   RENDER: CATALOG
============================================================ */
function renderCatalog(){
  const grid = document.getElementById('productGrid');
  if (products.length === 0){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No products yet. Check back soon.</div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
      <div class="card-body">
        <div class="card-name">${escapeHtml(p.name)}</div>
        <div class="card-desc">${escapeHtml(p.description)}</div>
        <div class="card-price">${fmt(p.price)}</div>
        <button class="buy-btn" data-id="${p.id}">Order this</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.buy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> placeOrder(btn.dataset.id));
  });
}

function placeOrder(productId){
  const product = products.find(p => p.id === productId);
  if (!product) return;

  const order = {
    code: genCode(),
    userId: tgUser.id,
    userName: tgUser.username ? "@" + tgUser.username : tgUser.first_name,
    productName: product.name,
    estimatePrice: product.price,
    finalPrice: null,
    deliveryDays: null,
    status: "pending" // pending -> confirmed
  };
  orders.unshift(order);
  toast("Order " + order.code + " placed");
  renderOrders();
  renderAdmin();
  switchTab('orders');
}

/* ============================================================
   RENDER: MY ORDERS
============================================================ */
function renderOrders(){
  const list = document.getElementById('ordersList');
  const mine = orders.filter(o => o.userId === tgUser.id);

  if (mine.length === 0){
    list.innerHTML = '<div class="empty">No orders yet. Pick something from the Catalog tab.</div>';
    return;
  }

  list.innerHTML = mine.map(o => `
    <div class="ticket">
      <div class="ticket-main">
        <h3>${escapeHtml(o.productName)}</h3>
        <div class="ticket-row"><span>Estimated price</span><b>${fmt(o.estimatePrice)}</b></div>
        <div class="ticket-row"><span>Final price</span><b>${o.finalPrice !== null ? fmt(o.finalPrice) : "—"}</b></div>
        <div class="ticket-row"><span>Delivery</span><b>${o.deliveryDays !== null ? o.deliveryDays + " days" : "—"}</b></div>
        ${o.status === "pending" ? `
          <div class="pay-box">
            <div class="label">Pay to confirm your order</div>
            <div class="value">Karta: ${PAYMENT_CARD}</div>
            <div class="value">Ism: ${PAYMENT_NAME}</div>
          </div>
        ` : ""}
      </div>
      <div class="ticket-stub">
        <div class="ticket-code">${o.code}</div>
        <div class="ticket-status ${o.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">
          ${o.status}
        </div>
      </div>
    </div>
  `).join('');
}

/* ============================================================
   RENDER: ADMIN
============================================================ */
function renderAdmin(){
  if (!isAdmin) return;
  const el = document.getElementById('adminContent');

  const productRows = products.map(p => `
    <div class="product-admin-row">
      <img src="${p.image}" alt="">
      <div class="pinfo"><b>${escapeHtml(p.name)}</b>${fmt(p.price)}</div>
      <button class="del-btn" data-del-product="${p.id}">Remove</button>
    </div>
  `).join('');

  const orderRows = orders.map(o => `
    <div class="ticket">
      <div class="ticket-main">
        <h3>${escapeHtml(o.productName)}</h3>
        <div class="ticket-row"><span>Buyer</span><b>${escapeHtml(o.userName)}</b></div>
        <div class="ticket-row"><span>Estimate</span><b>${fmt(o.estimatePrice)}</b></div>
        <div class="admin-order-form">
          <input type="number" min="0" step="0.01" placeholder="Final price"
                 id="fp-${o.code}" value="${o.finalPrice !== null ? o.finalPrice : ''}">
          <input type="number" min="0" step="1" placeholder="Delivery days"
                 id="dd-${o.code}" value="${o.deliveryDays !== null ? o.deliveryDays : ''}">
        </div>
        <button class="primary-btn" data-confirm="${o.code}">Save &amp; confirm order</button>
      </div>
      <div class="ticket-stub">
        <div class="ticket-code">${o.code}</div>
        <div class="ticket-status ${o.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">
          ${o.status}
        </div>
      </div>
    </div>
  `).join('') || '<div class="empty">No orders yet.</div>';

  el.innerHTML = `
    <div class="section-title">Add a product</div>
    <div class="field"><label>Name</label><input id="np-name" placeholder="Ronin Hoodie — Ink Wave"></div>
    <div class="field"><label>Price (USD)</label><input id="np-price" type="number" min="0" step="0.01" placeholder="39.99"></div>
    <div class="field"><label>Image URL</label><input id="np-image" placeholder="https://..."></div>
    <div class="field"><label>Description</label><textarea id="np-desc" rows="2" placeholder="Short description"></textarea></div>
    <button class="primary-btn" id="addProductBtn">Add product</button>

    <div class="section-title">Current products</div>
    ${productRows || '<div class="empty">No products yet.</div>'}

    <div class="section-title">Orders</div>
    ${orderRows}
  `;

  document.getElementById('addProductBtn').addEventListener('click', addProduct);
  el.querySelectorAll('[data-del-product]').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteProduct(btn.dataset.delProduct));
  });
  el.querySelectorAll('[data-confirm]').forEach(btn=>{
    btn.addEventListener('click', ()=> confirmOrder(btn.dataset.confirm));
  });
}

function addProduct(){
  const name = document.getElementById('np-name').value.trim();
  const price = parseFloat(document.getElementById('np-price').value);
  const image = document.getElementById('np-image').value.trim();
  const description = document.getElementById('np-desc').value.trim();

  if (!name || isNaN(price) || !image){
    toast("Fill in name, price and image URL");
    return;
  }

  products.unshift({
    id: "p" + Date.now(),
    name, price, image,
    description: description || "No description yet."
  });
  toast("Product added");
  renderCatalog();
  renderAdmin();
}

function deleteProduct(id){
  products = products.filter(p => p.id !== id);
  toast("Product removed");
  renderCatalog();
  renderAdmin();
}

function confirmOrder(code){
  const order = orders.find(o => o.code === code);
  if (!order) return;

  const fp = parseFloat(document.getElementById("fp-" + code).value);
  const dd = parseInt(document.getElementById("dd-" + code).value, 10);

  if (isNaN(fp) || isNaN(dd)){
    toast("Set both final price and delivery days");
    return;
  }

  order.finalPrice = fp;
  order.deliveryDays = dd;
  order.status = "confirmed";
  toast(code + " confirmed");
  renderAdmin();
  renderOrders();
}

/* ============================================================
   TABS
============================================================ */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=> switchTab(tab.dataset.tab));
  tab.addEventListener('keydown', e=>{
    if (e.key === 'Enter' || e.key === ' ') switchTab(tab.dataset.tab);
  });
});

/* ============================================================
   INIT
============================================================ */
if (isAdmin){
  document.getElementById('adminTab').style.display = 'block';
}
renderCatalog();
renderOrders();
renderAdmin();
</script>

</body>
</html>
